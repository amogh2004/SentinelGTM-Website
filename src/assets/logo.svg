<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded rectangle background -->
  <rect width="120" height="120" rx="26" fill="#111111"/>

  <!--
    Two interlocking half-ring arrows forming a cycle.
    Center: (60, 60)  |  Arc radius: 28  |  Stroke: 15
    Split diagonally — endpoints at upper-left (35,35) and lower-right (85,85).
    Purple = upper-right arc  |  White = lower-left arc
  -->

  <!-- Purple upper-right arc (clockwise from upper-left to lower-right) -->
  <path d="M 35,35 A 34,34 0 0 1 85,85"
        stroke="#c1c1ff" stroke-width="15" stroke-linecap="butt" fill="none"/>

  <!-- White lower-left arc (clockwise from lower-right to upper-left) -->
  <path d="M 85,85 A 34,34 0 0 1 35,35"
        stroke="white" stroke-width="15" stroke-linecap="butt" fill="none"/>

  <!--
    Arrowheads — rotated to match the tangent direction at each endpoint.
    At upper-left (35,35), clockwise tangent points upper-right (≈−45° from up).
    At lower-right (85,85), clockwise tangent points lower-left (≈135° from up).
    We rotate base UP/DOWN triangles by ±45° at each tip.
  -->

  <!-- White arrowhead at upper-left, pointing upper-right (rotated -45°) -->
  <polygon points="35,18 24,38 46,38" fill="white"
           transform="rotate(-45 35 35)"/>

  <!-- Purple arrowhead at lower-right, pointing lower-left (rotated -45°) -->
  <polygon points="85,102 74,82 96,82" fill="#c1c1ff"
           transform="rotate(-45 85 85)"/>
</svg>
